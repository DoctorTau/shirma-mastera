services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: monster_screen
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/monster_screen?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      LISTEN_ADDR: ":8080"
      CRAWL_INTERVAL_DAYS: ${CRAWL_INTERVAL_DAYS:-30}
      CRAWL_RATE_LIMIT_MS: ${CRAWL_RATE_LIMIT_MS:-600}
      DNDSU_BASE_URL_2014: ${DNDSU_BASE_URL_2014:-https://dnd.su}
      DNDSU_BASE_URL_2024: ${DNDSU_BASE_URL_2024:-https://next.dnd.su}
      CRAWL_USER_AGENT: ${CRAWL_USER_AGENT:-monster-screen-dm-companion/1.0 (personal use)}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8000:80"

volumes:
  db_data:
